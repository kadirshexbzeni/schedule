<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خشتەی دەوامی شیفتاتی ئاسایشی فڕۆکەخانەی هەولێری نێودەوڵەیی</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 15px;
            margin: 0;
        }

        h1 { color: var(--primary); font-size: 1.2rem; margin-bottom: 15px; }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            width: 100%; padding: 12px; font-size: 1.1rem; margin-bottom: 15px;
            border-radius: 10px; border: 2px solid #334155; background: #0f172a;
            color: white; text-align: center; outline: none;
        }

        .res-date-top { 
            color: #ffffff; font-size: 1.2rem; font-weight: bold; 
            margin-bottom: 15px; display: block;
        }

        .all-groups-status { display: flex; flex-direction: column; gap: 10px; }

        .group-card {
            background: rgba(15, 23, 42, 0.7);
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid #334155;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .group-card.active-table { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); }

        .on-duty-badge {
            background: var(--success);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            position: absolute;
            top: -8px;
            left: 10px;
            box-shadow: 0 0 8px var(--success);
            font-weight: bold;
        }

        .group-header { display: flex; justify-content: space-between; align-items: center; }
        .group-name { font-weight: bold; color: var(--primary); }
        .shift-text { font-size: 0.95rem; font-weight: bold; direction: ltr; }

        .day { color: #fbbf24; }
        .evening { color: #22c55e; }
        .night { color: #38bdf8; }
        .off { color: var(--danger); }

        .table-container { margin-top: 25px; overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); font-size: 0.85rem; }
        th { background: #334155; color: var(--primary); padding: 12px 5px; text-align: center; }
        td { padding: 10px 4px; border-bottom: 1px solid #334155; white-space: nowrap; text-align: center; }
        .today-row { background: rgba(56, 189, 248, 0.15) !important; }

        .visitor-counter {
            margin-top: 30px;
            padding: 15px;
            font-size: 0.85rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
            display: block;
        }
        .visitor-counter img {
            margin-top: 8px;
            filter: hue-rotate(180deg); /* بۆ ئەوەی ڕەنگی ژمارەکە لەگەڵ دیزاینەکە بگونجێت */
        }
    </style>
</head>
<body>

    <h1>ئاسایشی فڕۆکەخانەی هەولێر</h1>

    <div class="container">
        <input type="date" id="date" onchange="updateAll()">
        <span id="res-date" class="res-date-top">--</span>
        <div class="all-groups-status" id="allGroups"></div>
    </div>

    <h3 id="tableTitle" style="color:var(--primary); margin-top:25px; font-size: 1rem;">خشتەی مانگانە</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ڕێکەوت</th>
                    <th>ڕۆژ</th>
                    <th style="text-align: center;">کاتژمێری کار</th>
                </tr>
            </thead>
            <tbody id="monthBody"></tbody>
        </table>
    </div>

    <div class="visitor-counter">
        👁️ ژمارەی سەردانیکەران<br>
        <img src="https://profile-counter.glitch.me/kadir-airport-shift-v3/count.svg" alt="Visitor Count">
    </div>

    <script>
        const rotation = [
            { A: "OFF 24", B: "07:00-03:00", C: "11:00-07:00", D: "03:00-11:00" },
            { A: "07:00-03:00", B: "OFF", C: "11:00-07:00", D: "03:00-11:00" },
            { A: "07:00-03:00", B: "03:00-11:00", C: "OFF 24", D: "11:00-07:00" },
            { A: "OFF", B: "03:00-11:00", C: "07:00-03:00", D: "11:00-07:00" },
            { A: "03:00-11:00", B: "11:00-07:00", C: "07:00-03:00", D: "OFF 24" },
            { A: "03:00-11:00", B: "11:00-07:00", C: "OFF", D: "07:00-03:00" },
            { A: "11:00-07:00", B: "OFF 24", C: "03:00-11:00", D: "07:00-03:00" },
            { A: "11:00-07:00", B: "07:00-03:00", C: "03:00-11:00", D: "OFF" }
        ];

        const kurdishDays = ["یەکشەممە", "دووشەممە", "سێشەممە", "چوارشەممە", "پێنجشەممە", "هەینی", "شەممە"];
        const baseDate = new Date("2026-03-14"); 

        function getShiftInfo(date, group) {
            let d = new Date(date); d.setHours(0,0,0,0);
            let s = new Date(baseDate); s.setHours(0,0,0,0);
            let diff = Math.floor((d - s) / (1000 * 60 * 60 * 24));
            let index = diff % 8; if (index < 0) index += 8;
            
            let raw = rotation[index][group];
            let color = "off"; let text = raw;

            if (raw === "07:00-03:00") { text = "07:00 AM - 03:00 PM"; color = "day"; }
            else if (raw === "03:00-11:00") { text = "03:00 PM - 11:00 PM"; color = "evening"; }
            else if (raw === "11:00-07:00") { text = "11:00 PM - 07:00 AM"; color = "night"; }
            else if (raw === "OFF 24") { text = "پشووی ٢٤ کاتژمێری"; color = "off"; }
            else if (raw === "OFF") { text = "پشوو"; color = "off"; }
            
            return { text, color, raw };
        }

        function isCurrentlyOnDuty(raw, selectedDate) {
            if (raw.includes("OFF")) return false;
            const today = new Date();
            const sel = new Date(selectedDate);
            if (today.toDateString() !== sel.toDateString()) return false;

            const hour = today.getHours();
            if (raw === "07:00-03:00" && hour >= 7 && hour < 15) return true;
            if (raw === "03:00-11:00" && hour >= 15 && hour < 23) return true;
            if (raw === "11:00-07:00" && (hour >= 23 || hour < 7)) return true;
            return false;
        }

        let currentGroup = "A";

        function updateAll() {
            const dateInput = document.getElementById("date");
            const selectedDate = new Date(dateInput.value);
            if (isNaN(selectedDate)) return;

            document.getElementById("res-date").innerText = kurdishDays[selectedDate.getDay()] + " " + selectedDate.toLocaleDateString('ku-IQ');

            const allGroupsDiv = document.getElementById("allGroups");
            allGroupsDiv.innerHTML = "";
            ["A", "B", "C", "D"].forEach(g => {
                let info = getShiftInfo(selectedDate, g);
                let onDuty = isCurrentlyOnDuty(info.raw, selectedDate);
                let activeClass = (g === currentGroup) ? "active-table" : "";
                
                allGroupsDiv.innerHTML += `
                    <div class="group-card ${activeClass}" onclick="currentGroup='${g}'; updateAll();">
                        ${onDuty ? '<div class="on-duty-badge">ئێستا لە دەوامە</div>' : ''}
                        <div class="group-header">
                            <span class="group-name">گرووپی ${g}</span>
                            <span class="shift-text ${info.color}">${info.text}</span>
                        </div>
                    </div>`;
            });

            updateTable(selectedDate);
        }

        function updateTable(selectedDate) {
            document.getElementById("tableTitle").innerText = `خشتەی مانگانەی (گرووپی ${currentGroup})`;
            const monthBody = document.getElementById("monthBody");
            monthBody.innerHTML = "";
            let year = selectedDate.getFullYear(), month = selectedDate.getMonth();
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            let today = new Date(); today.setHours(0,0,0,0);

            for (let i = 1; i <= daysInMonth; i++) {
                let curDate = new Date(year, month, i);
                let info = getShiftInfo(curDate, currentGroup);
                let isToday = (curDate.getTime() === today.getTime()) ? "today-row" : "";
                monthBody.innerHTML += `<tr class="${isToday}">
                    <td>${i}-${month + 1}</td>
                    <td>${kurdishDays[curDate.getDay()]}</td>
                    <td class="${info.color}" style="direction:ltr; font-weight:bold; text-align:center;">${info.text}</td>
                </tr>`;
            }
        }

        window.onload = () => {
            document.getElementById("date").value = new Date().toISOString().split("T")[0];
            updateAll();
        };
    </script>
</body>
</html>
